<DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Do You Love Me?</title>
<div id="hearts"></div>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        margin-top: 100px;
    }

    h1 {
        font-size: 40px;
        color: #fff;
    }

    .btn {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        position: absolute;
    }

    #yes {
        background-color: #4CAF50;
        color: white;
        left: 40%;
        top: 50%;
    }

    #no {
        background-color: #f44336;
        color: white;
        left: 55%;
        top: 50%;
    }
  #result{
    font-size: 35px;
    color: red;
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
}
#hearts{
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    bottom:-20px;
    font-size:24px;
    animation: floatUp 4s linear infinite;
}

@keyframes floatUp{
    0%{
        transform: translateY(0);
        opacity:1;
    }
    100%{
        transform: translateY(-100vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>Do You Love Me? ❤️</h1>
<p id="result"></p>
<button id="yes" class="btn" onclick="yesClick()">Yes</button>
<button id="no" class="btn">No</button>

<script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

   function yesClick() {
    document.getElementById("result").innerHTML = "I Love You Too ❤️😘";
    document.getElementById("no").style.display = "none";
    document.getElementById("yes").style.display = "none";
startHearts();
}
function startHearts(){
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (20 + Math.random()*30) + "px";

        document.getElementById("hearts").appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);

    },300);
}


let noCount = 0;

document.getElementById("no").addEventListener("mouseover", function(){
    noCount++;

    if(noCount === 5){
        document.getElementById("result").innerHTML = "Single hi rehna hai kya 😒";
    }
});
</script>

</body>
</html>
