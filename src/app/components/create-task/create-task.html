<div class="app-container narrow-form">
  <header class="app-header">
    <h1>Create Task <span class="badge">Manual Mode</span></h1>
    <p class="subtitle">Add a new item directly to your schedule</p>
  </header>

  <main class="main-content">
    <div class="control-panel form-card">
      <form (ngSubmit)="submitTask()">
        
        <div class="form-group">
          <label for="task-title">Task Title <span class="required">*</span></label>
          <input
            id="task-title"
            type="text"
            placeholder="What needs to be done?"
            [(ngModel)]="task.title"
            name="title"
            required
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="task-desc">Detailed Description</label>
          <textarea
            id="task-desc"
            placeholder="Add extra context, details, or steps..."
            [(ngModel)]="task.description"
            name="description"
            rows="4"
            class="form-input">
          </textarea>
        </div>

        <div class="form-group">
          <label for="task-date">Target Due Date <span class="required">*</span></label>
          <input
            id="task-date"
            type="date"
            [(ngModel)]="task.dueDate"
            name="dueDate"
            required
            class="form-input"
          />
        </div>

        <div class="form-actions-row">
          <button type="button" class="btn btn-secondary btn-back-nav" (click)="goBack()">
            ⬅️ Back to Dashboard
          </button>
          
          <button type="submit" class="btn btn-primary btn-submit">
            🚀 Create Task
          </button>
        </div>

      </form>
    </div>
  </main>
</div>
